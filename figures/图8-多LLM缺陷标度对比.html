<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图8：多LLM缺陷密度标度律对比</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;word-break:break-word;overflow-wrap:break-word}body{background:#e8ecf1;font-family:"Microsoft YaHei","Helvetica Neue",Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;padding:8px 24px}
.toolbar span{color:#666;font-size:17px}.toolbar button{background:#fff;border:1px solid #ccc;color:#333;padding:6px 20px;border-radius:4px;font-size:17px;cursor:pointer}.toolbar button:hover{background:#f0f0f0}
#canvas{width:1200px;background:#fff;border:1px solid #dee2e6;padding:24px 28px;margin-top:48px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.title{text-align:center;margin-bottom:16px}.title h1{font-size:34px;color:#222;font-weight:700}.title .sub{font-size:17px;color:#666;margin-top:4px}
.chart-box{ overflow: visible;height:540px}.chart-box canvas{width:100%!important}

.insight h4{font-size:17px;color:#333;margin-bottom:6px}.insight p{font-size:20px;color:#555;line-height:1.7}


</style>
</head>
<body>
<div class="toolbar"><span>图8：多LLM缺陷密度标度律对比</span><button onclick="downloadPNG()">Download PNG (2x)</button></div>
<div id="canvas">
  <div class="title"><h1>跨LLM缺陷密度标度律：模型对比</h1><div class="sub">GPT-4 / DeepSeek-Coder-V2 / Qwen2.5-Coder-7B 在四个代码规模等级上的缺陷密度</div></div>
  <div class="chart-box"><canvas id="chart"></canvas></div>
  
  
</div>
<script>
var labels=['small (~30 LOC)','medium (~70 LOC)','large (~120 LOC)','xlarge (~180 LOC)'];
var dd_gpt4=[4.8,5.6,7.2,10.5];
var dd_ds=[5.9,6.8,8.4,12.1];
var dd_qwen=[7.9,6.8,8.5,13.7];
new Chart(document.getElementById('chart').getContext('2d'),{
type:'bar',data:{labels:labels,datasets:[
{label:'GPT-4（预计值）',data:dd_gpt4,backgroundColor:'rgba(52,152,219,.6)',borderColor:'#2471a3',borderWidth:1},
{label:'DeepSeek-Coder-V2（预计值）',data:dd_ds,backgroundColor:'rgba(39,174,96,.6)',borderColor:'#1e8449',borderWidth:1},
{label:'Qwen2.5-Coder-7B（实测）',data:dd_qwen,backgroundColor:'rgba(230,126,34,.75)',borderColor:'#ba4a00',borderWidth:1.5,borderDash:[]},
]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#555',font: { size: 14 },padding:16,usePointStyle:true,pointStyleWidth:8}}},
scales:{x:{title:{display:true,text:'代码规模等级',color:'#333',font:{size:13,weight:'bold'}},ticks:{color:'#666',font: { size: 15 }},grid:{drawOnChartArea:false}},
y:{title:{display:true,text:'缺陷密度 (/100 LOC)',color:'#333',font:{size:13,weight:'bold'}},ticks:{color:'#666',font: { size: 15 }},grid:{color:'#eee',lineWidth:.5}}}}
});
function downloadPNG(){html2canvas(document.getElementById('canvas'),{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(function(c){var l=document.createElement('a');l.download='Figure8-MultiLLM-Defect-Scaling.png';l.href=c.toDataURL('image/png');l.click()})}
</script>
</body>
</html>
