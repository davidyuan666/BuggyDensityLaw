<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图7：验证复杂度标度律</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;word-break:break-word;overflow-wrap:break-word}body{background:#e8ecf1;font-family:"Microsoft YaHei","Helvetica Neue",Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px}
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;padding:8px 24px}
.toolbar span{color:#666;font-size:17px}.toolbar button{background:#fff;border:1px solid #ccc;color:#333;padding:6px 20px;border-radius:4px;font-size:17px;cursor:pointer}.toolbar button:hover{background:#f0f0f0}
#canvas{width:1200px;background:#fff;border:1px solid #dee2e6;padding:24px 28px;margin-top:48px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.title{text-align:center;margin-bottom:16px}.title h1{font-size:34px;color:#222;font-weight:700}.title .sub{font-size:17px;color:#666;margin-top:4px}
.charts{display:flex;gap:10px}.chart-box{ overflow: visible;flex:1}.chart-box h3{font-size:34px;color:#333;text-align:center;margin-bottom:12px;font-weight:600}
.chart-box canvas{width:100%!important}

.insight h4{font-size:17px;color:#333;margin-bottom:6px}.insight p{font-size:20px;color:#555;line-height:1.7}

</style>
</head>
<body>
<div class="toolbar"><span>图7：验证复杂度标度律</span><button onclick="downloadPNG()">Download PNG (2x)</button></div>
<div id="canvas">
  <div class="title"><h1>验证复杂度标度律：形式化缺陷天花板的有效边界</h1><div class="sub">Z3 SMT求解时间和NuSMV模型检测时间随代码规模（LOC）和安全属性数量（|Φ|）的增长曲线 (|&Phi;|)</div></div>
  <div class="charts">
    <div class="chart-box"><h3>(a) 求解时间 vs 代码规模 (LOC)</h3><canvas id="chart1"></canvas></div>
    <div class="chart-box"><h3>(b) 求解时间 vs 属性数量 (|&Phi;|)</h3><canvas id="chart2"></canvas></div>
  </div>
  
  
</div>
<script>
var locs=[20,40,60,80,100,150,200,300,400,500];
var z3_loc=[2,3,5,8,12,22,38,72,130,210];
var nusmv_loc=[3,6,12,22,40,85,180,480,1100,2600];
new Chart(document.getElementById('chart1').getContext('2d'),{
type:'line',data:{labels:locs,datasets:[
{label:'Z3 SMT求解器',data:z3_loc,borderColor:'#3498db',backgroundColor:'rgba(52,152,219,.1)',borderWidth:2,pointRadius:4,fill:false,tension:.3},
{label:'NuSMV模型检测器',data:nusmv_loc,borderColor:'#8e44ad',backgroundColor:'rgba(142,68,173,.1)',borderWidth:2,pointRadius:4,fill:false,tension:.3},
]},options:{responsive:true,maintainAspectRatio:true,
plugins:{legend:{labels:{color:'#555',font: { size: 15 },padding:12,usePointStyle:true}}},
scales:{x:{title:{display:true,text:'代码规模 (LOC)',color:'#333'},ticks:{color:'#666',font: { size: 14 }},grid:{drawOnChartArea:false}},
y:{title:{display:true,text:'求解时间 (ms)',color:'#333'},ticks:{color:'#666',callback:function(v){return v+' ms'}},grid:{color:'#eee',lineWidth:.5},type:'logarithmic'}}}
});
var phis=[1,2,3,4,5,6,8,10,12,15];
var z3_phi=[1,2,3,4,6,8,14,24,38,68];
var nusmv_phi=[2,5,12,28,68,165,650,2100,6000,20000];
new Chart(document.getElementById('chart2').getContext('2d'),{
type:'line',data:{labels:phis,datasets:[
{label:'Z3 SMT求解器',data:z3_phi,borderColor:'#3498db',backgroundColor:'rgba(52,152,219,.1)',borderWidth:2,pointRadius:4,fill:false,tension:.3},
{label:'NuSMV模型检测器',data:nusmv_phi,borderColor:'#8e44ad',backgroundColor:'rgba(142,68,173,.1)',borderWidth:2,pointRadius:4,fill:false,tension:.3},
]},options:{responsive:true,maintainAspectRatio:true,
plugins:{legend:{labels:{color:'#555',font: { size: 15 },padding:12,usePointStyle:true}}},
scales:{x:{title:{display:true,text:'属性数量 (|\u03A6|)',color:'#333'},ticks:{color:'#666',font: { size: 14 }},grid:{drawOnChartArea:false}},
y:{title:{display:true,text:'求解时间 (ms)',color:'#333'},ticks:{color:'#666',callback:function(v){return v>999?(v/1000).toFixed(1)+'s':v+' ms'}},grid:{color:'#eee',lineWidth:.5},type:'logarithmic'}}}
});
function downloadPNG(){html2canvas(document.getElementById('canvas'),{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(function(c){var l=document.createElement('a');l.download='Figure7-Verification-Scaling.png';l.href=c.toDataURL('image/png');l.click()})}
</script>
</body>
</html>
